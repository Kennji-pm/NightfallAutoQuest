# ═══════════════════════════════════════════════════════
#                    SYSTEM & ERRORS
# ═══════════════════════════════════════════════════════
command:
  no-permission: "<red>Bạn không có quyền sử dụng lệnh này!"
  invalid-subcommand: "<red>Lệnh phụ không hợp lệ!"
  player-only: "<red>Lệnh này chỉ dành cho người chơi!"
  unknown: "<red>Lệnh không tồn tại. Dùng <yellow>/naq help <red>để xem trợ giúp."
  help:
    header: "<gradient:#5e4fa2:#f7941d><bold>NIGHTFALL AUTOQUEST HELP</bold></gradient>"
    footer: "<gradient:#f7941d:#5e4fa2>──────────────────────────</gradient>"

no-data-available: "<dark_red>Không tìm thấy dữ liệu người chơi!"
player-not-found: "<red>Không tìm thấy người chơi <yellow>%player% <red>đang hoạt động!"

# ═══════════════════════════════════════════════════════
#                    QUESTS
# ═══════════════════════════════════════════════════════
quest:
  no-active: "<gray>Bạn hiện không có nhiệm vụ nào đang hoạt động."
  invalid: "<red>Dữ liệu nhiệm vụ không hợp lệ."
  assigned:
    - "<gradient:#5e4fa2:#f7941d><bold>NHIỆM VỤ MỚI</bold></gradient>"
    - "<gray>Tên: <white>%name%"
    - "<gray>Mục tiêu: <green>%type% %amount% %task%"
    - "<gray>Thời gian: <red>%time% phút"
  completed: "<green><bold>HOÀN THÀNH!</bold> <white>Bạn đã hoàn thành nhiệm vụ <yellow>%name%<white>."
  failed: "<red><bold>THẤT BẠI!</bold> <gray>Nhiệm vụ <white>%name% <gray>đã kết thúc."
  giveup: "<yellow>Bạn đã từ bỏ nhiệm vụ hiện tại."
  warning: "<red><bold>CẢNH BÁO!</bold> <gray>Nhiệm vụ sắp hết hạn trong <yellow>%time%<gray>."
  streak:
    lost: "<red><bold>PHÁ VỠ CHUỖI!</bold> <gray>Bạn đã mất chuỗi <yellow>%streak% <gray>nhiệm vụ liên tiếp."
    milestone: "<gradient:#f7941d:#5e4fa2><bold>CHUỖI NHIỆM VỤ!</bold></gradient> <gray>Bạn đã đạt chuỗi <aqua>%streak% <gray>nhiệm vụ. Thưởng thêm: <green>+%bonus%%"
  info:
    header: "<gradient:#5e4fa2:#f7941d><bold>THÔNG TIN NHIỆM VỤ</bold></gradient>"
    format:
      - "<gray>Tên: <white>%name%"
      - "%description%"
      - "<gray>Tiến trình: <green>%progress%/%amount% <dark_gray>(<white>%type% %task%<dark_gray>)"
      - "<gray>Chuỗi hiện tại: <yellow>%streak%"
      - "<gray>Thời gian còn lại: <red>%time%"
    footer: "<gradient:#f7941d:#5e4fa2>──────────────────────────</gradient>"

# ═══════════════════════════════════════════════════════
#                    BOSSBAR
# ═══════════════════════════════════════════════════════
bossbar:
  title: "<gradient:#5e4fa2:#f7941d>%name%</gradient> <gray>┃ <white>%progress%/%amount% <gray>┃ <red>%time%"

# ═══════════════════════════════════════════════════════
#                    STATS & TOP
# ═══════════════════════════════════════════════════════
stats:
  - "<gradient:#5e4fa2:#f7941d><bold>THÔNG TIN CỦA BẠN</bold></gradient>"
  - "<gray>Hoàn thành: <green>%completions%"
  - "<gray>Thất bại: <red>%failures%"
  - "<gray>Chuỗi hiện tại: <yellow>%streak%"
  - "<gray>Tỷ lệ: <aqua>%rate%"
top:
  header: "<gradient:#5e4fa2:#f7941d><bold>BẢNG XẾP HẠNG</bold></gradient> <gray>(Trang %page%/%total%)"
  format: "<gray>%rank%. <white>%player% <gray>» <green>%completions% <gray>(<aqua>%rate%<gray>)"
  footer: "<gray>Tổng số người chơi: <white>%total%"

# ═══════════════════════════════════════════════════════
#                    ADMIN DATA
# ═══════════════════════════════════════════════════════
getdata:
  header: "<gray>§m────────────────────────────────────────"
  title: "<gradient:#5e4fa2:#f7941d><bold>DỮ LIỆU NGƯỜI CHƠI:</bold></gradient> <yellow>%player%"
  uuid: "<gray>» UUID: <white>%uuid%"
  completions: "<gray>» Hoàn thành: <green>%completions%"
  failures: "<gray>» Thất bại: <red>%failures%"
  streak: "<gray>» Chuỗi: <yellow>%streak%"
  active: "<gray>» Nhiệm vụ: <white>%active%"
  task: "    <gray>» Loại: <white>%task%"
  progress: "    <gray>» Tiến trình: <green>%progress%<gray>/<white>%amount%"
  time: "    <gray>» Hết hạn sau: <red>%time%"
  no-active: "§8Không có"
  footer: "<gray>§m────────────────────────────────────────"

# ═══════════════════════════════════════════════════════
#                    BOSSBAR UPGRADE
# ═══════════════════════════════════════════════════════
bossbar:
  title: "<gradient:#5e4fa2:#f7941d>%name%</gradient> <gray>┃ <white>%progress%/%amount% <gray>┃ <red>%time%"
  status:
    complete: "<green><bold>HOÀN THÀNH!</bold> <white>%name%"
    failed: "<red><bold>THẤT BẠI!</bold> <gray>%name%"
    giveup: "<yellow><bold>HỦY BỎ!</bold> <gray>%name%"

# ═══════════════════════════════════════════════════════
#                    COMMANDS & ADMIN
# ═══════════════════════════════════════════════════════
reload-success: "<green>Cấu hình đã được tải lại thành công!"
purge-success: "<red>Toàn bộ dữ liệu đã được xóa sạch."

help:
  header: "<gradient:#5e4fa2:#f7941d><bold>NIGHTFALLAUTOQUEST HELP</bold></gradient>"
  player:
    - "<green>/naq quest <gray>» Xem nhiệm vụ hiện tại"
    - "<green>/naq stats <gray>» Xem thống kê cá nhân"
    - "<green>/naq top <gray>» Xem bảng xếp hạng"
    - "<green>/naq giveup <gray>» Từ bỏ nhiệm vụ"
  admin:
    - "<red>/naq reload <gray>» Tải lại cấu hình"
    - "<red>/naq purge <gray>» Xóa dữ liệu (nguy hiểm)"

# ═══════════════════════════════════════════════════════
#                    TASKS
# ═══════════════════════════════════════════════════════
tasks:
  mining: "Khai thác"
  placing: "Đặt khối"
  mobkilling: "Tiêu diệt"
  walking: "Di chuyển"
  fishing: "Câu cá"
  smelting: "Nấu nung"
  crafting: "Chế tạo"
  farming: "Nông nghiệp"
  dealdamage: "Gây sát thương"
  enchanting: "Phù phép"
  placeholder: "Placeholder"
