name: "${project.name}"
version: "${project.version}"
main: org.kennji.nightfallAutoQuest.NightfallAutoQuest
api-version: "1.21"
authors: [_kennji]
description: Project Nightfall - Automatic Quest System
softdepend: [PlaceholderAPI]

libraries:
  - "com.zaxxer:HikariCP:6.2.1"

commands:
  nightfallautoquest:
    description: Main command for NightfallAutoQuest
    aliases:
      - nq
      - naq
      - autoquest
    usage: /<command> [help|reload|stats|top|giveup]

permissions:
  naq.use:
    description: Allows use of basic quest commands (quest, stats, top, giveup, help)
    default: true
  naq.admin:
    description: Allows use of admin commands (reload, getdata)
    default: op
